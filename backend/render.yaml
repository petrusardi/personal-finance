services:
  - type: web
    name: personal-finance-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: personal-finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app  # ganti dengan URL Vercel kamu nanti

databases:
  - name: personal-finance-db
    databaseName: personal_finance
    plan: free
